name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # svelte-check runs before Vite, so it can't see Paraglide-generated
      # code at $lib/paraglide/. We skip the separate typecheck and let
      # `npm run build` handle type validation during compile.
      - name: Build static site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          # Pass 1: long cache for hashed assets. --delete scoped to non-HTML
          # files by the exclude list.
          aws s3 sync build/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.xml" \
            --exclude "*.txt"

          # Pass 2: short cache for HTML/JSON/XML/TXT with --delete, scoped to
          # those extensions via include/exclude so stale routes from previous
          # deploys are removed.
          aws s3 sync build/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --cache-control "max-age=3600,public" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.xml" \
            --include "*.txt"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment complete
        run: echo "Deployed to https://toolkit.energy"
